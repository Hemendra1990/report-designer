# Test configuration for DuckDB integration testing

# PostgreSQL Test Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/test_rd
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# DuckDB Configuration - Use in-memory for tests
duckdb.in-memory=true
duckdb.file-path=./target/test-duckdb.db
duckdb.init-sql-path=classpath:duckdb-init.sql

# Logging for tests
logging.level.com.reportdesigner=DEBUG
logging.level.com.reportdesigner.service.duckdb=DEBUG 